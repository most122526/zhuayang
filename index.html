<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>抓痒头调试助手 · 智能外设</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #1e1e2e;
      --card: #2a2a3c;
      --accent: #f59e4b;
      --accent2: #e8685a;
      --text: #f0e9e1;
      --text2: #b0a8a0;
      --bar-bg: #3a3a4e;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 60% 20%, #30243a, #1a1a26);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .phone {
      max-width: 400px;
      width: 100%;
      background: var(--bg);
      border-radius: 44px;
      padding: 18px 16px 24px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.06);
      border: 1px solid #4a3e52;
      color: var(--text);
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #252538;
      border-radius: 30px;
      padding: 8px 16px;
      margin-bottom: 16px;
      font-weight: 500;
      font-size: 0.8rem;
    }
    .bt-area { display:flex; align-items:center; gap:8px; }
    .led {
      width: 10px; height: 10px; background: #5a5a7a; border-radius: 50%;
      transition: 0.3s;
    }
    .led.active {
      background: #2ecc71; box-shadow: 0 0 12px #2ecc71; animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.7;transform:scale(1);} 50%{opacity:1;transform:scale(1.2);} }
    .clock { font-family: monospace; font-weight: 600; }
    .btn {
      background: #3c3c52; border: none; padding: 6px 14px; border-radius: 2rem;
      font-weight: 600; font-size: 0.7rem; color: #fff; cursor: pointer;
      display: flex; align-items: center; gap: 5px; border: 1px solid #5a5a76;
      transition: 0.15s;
    }
    .btn:active { transform: scale(0.95); background: #52526a; }
    .btn-primary { background: #b45f3a; border-color: #d0784c; }
    .btn-warn { background: #a6442c; border-color: #c05a3e; }
    .config-panel {
      display: none; background: #252538; border-radius: 18px; padding: 12px;
      margin-bottom: 14px; border: 1px solid #4a3e52; flex-direction: column; gap: 8px;
    }
    .config-panel input {
      background: #1a1a26; border: 1px solid #4a3e52; color: #fff; padding: 6px 10px;
      border-radius: 16px; font-family: monospace; font-size: 0.65rem; flex:1; outline: none;
    }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .main-display {
      background: var(--card); border-radius: 28px; padding: 16px; margin-bottom: 16px;
      border: 1px solid #4a3e52; text-align: center;
    }
    .model-container {
      position: relative; height: 200px; margin: 8px 0 12px; display: flex;
      align-items: flex-end; justify-content: center; background: #1a1a26;
      border-radius: 24px; overflow: hidden; border: 1px solid #3a3a4e;
    }
    .scratch-head {
      position: absolute; bottom: 0; width: 60px; background: linear-gradient(180deg, #e8685a, #c04a3a);
      border-radius: 30px 30px 10px 10px; transition: height 0.1s linear;
      box-shadow: 0 -4px 12px rgba(232,104,90,0.5); left: 50%; transform: translateX(-50%);
    }
    .head-tip {
      width: 30px; height: 30px; background: #f7d08a; border-radius: 50%;
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
      box-shadow: 0 0 15px #f7d08a;
    }
    .slider-row {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    input[type=range] {
      flex:1; height: 6px; -webkit-appearance: none; background: var(--bar-bg);
      border-radius: 6px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 28px; height: 28px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 10px var(--accent); cursor: pointer;
    }
    .output-value {
      font-weight: 800; font-size: 1.8rem; color: var(--accent); min-width: 60px; text-align: center;
    }
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .stat-card {
      background: var(--card); border-radius: 18px; padding: 12px; text-align: center;
      border: 1px solid #4a3e52;
    }
    .stat-label { font-size: 0.6rem; color: var(--text2); }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin: 4px 0; }
    .log-box {
      background: #12121e; border-radius: 16px; padding: 10px; height: 100px;
      overflow-y: auto; font-family: monospace; font-size: 0.6rem; color: #b0b0c0;
      border: 1px solid #2e2e42; margin-top: 10px;
    }
    .send-btn {
      background: var(--accent); border: none; padding: 12px;
      border-radius: 30px; font-weight: 800; color: #1a1a26; width: 100%;
      font-size: 0.9rem; cursor: pointer; margin-top: 8px;
      box-shadow: 0 6px 18px rgba(245,158,75,0.4);
    }
    .send-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <div class="bt-area">
      <div class="led" id="bleLed"></div>
      <span id="connStatus">未连接</span>
      <button class="btn" id="configToggleBtn"><i class="fas fa-cog"></i></button>
    </div>
    <div class="clock" id="liveClock">--:--:--</div>
  </div>

  <div class="config-panel" id="configPanel">
    <div class="row">
      <input id="serviceUuid" value="0000fff0-0000-1000-8000-00805f9b34fb" placeholder="服务UUID">
      <input id="notifyUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="通知UUID">
      <input id="writeUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="写入UUID">
    </div>
    <div class="row">
      <button class="btn" id="scanBtn">扫描</button>
      <button class="btn" id="connectBtn" disabled>连接</button>
      <button class="btn btn-warn" id="disconnectBtn" disabled>断开</button>
      <button class="btn" id="simulateBtn"><i class="fas fa-sync-alt"></i> 模拟</button>
    </div>
  </div>

  <div class="main-display">
    <div style="font-weight:700; margin-bottom:4px;">🔧 抓痒头伸缩模型</div>
    <div class="model-container" id="modelBox">
      <div class="scratch-head" id="scratchHead" style="height: 100px;">
        <div class="head-tip"></div>
      </div>
    </div>
    <div class="slider-row">
      <span style="color:var(--text2);">20</span>
      <input type="range" id="outputSlider" min="20" max="180" value="100">
      <span style="color:var(--text2);">180</span>
      <span class="output-value" id="outputDisplay">100</span>
    </div>
    <button class="send-btn" id="sendCmdBtn"><i class="fas fa-paper-plane"></i> 下发输出量</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">📊 力反馈</div>
      <div class="stat-value" id="forceVal">0.0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⚙️ 反馈输出量</div>
      <div class="stat-value" id="feedbackVal">0</div>
    </div>
  </div>

  <div class="log-box" id="logBox">
    <div>🔧 抓痒头调试助手就绪</div>
  </div>
</div>

<script>
  (function() {
    // DOM
    const bleLed = document.getElementById('bleLed');
    const connStatus = document.getElementById('connStatus');
    const configToggleBtn = document.getElementById('configToggleBtn');
    const configPanel = document.getElementById('configPanel');
    const scanBtn = document.getElementById('scanBtn');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const simulateBtn = document.getElementById('simulateBtn');
    const serviceUuidInput = document.getElementById('serviceUuid');
    const notifyUuidInput = document.getElementById('notifyUuid');
    const writeUuidInput = document.getElementById('writeUuid');
    const outputSlider = document.getElementById('outputSlider');
    const outputDisplay = document.getElementById('outputDisplay');
    const scratchHead = document.getElementById('scratchHead');
    const sendCmdBtn = document.getElementById('sendCmdBtn');
    const forceValSpan = document.getElementById('forceVal');
    const feedbackValSpan = document.getElementById('feedbackVal');
    const logBox = document.getElementById('logBox');
    const clockSpan = document.getElementById('liveClock');

    let bluetoothDevice = null;
    let gattServer = null;
    let notifyChar = null;
    let writeChar = null;
    let isConnected = false;

    function updateClock() {
      clockSpan.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function addLog(msg, type='info') {
      const div = document.createElement('div');
      div.style.color = type==='rx'?'#2ecc71': type==='tx'?'#3498db':'#b0b0c0';
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
      if(logBox.children.length > 30) logBox.removeChild(logBox.children[0]);
    }

    function updateConnectionUI(connected) {
      isConnected = connected;
      bleLed.classList.toggle('active', connected);
      connStatus.textContent = connected ? '已连接' : '未连接';
      connectBtn.disabled = connected || !bluetoothDevice;
      disconnectBtn.disabled = !connected;
      scanBtn.disabled = connected;
    }

    // 更新伸出模型与显示
    function updateOutputModel(value) {
      const v = Math.min(180, Math.max(20, value));
      outputSlider.value = v;
      outputDisplay.textContent = v;
      // 映射高度: 20->30px, 180->170px  (范围30~170)
      const h = 30 + (v - 20) * (140 / 160);
      scratchHead.style.height = h + 'px';
    }
    outputSlider.addEventListener('input', () => {
      const v = parseInt(outputSlider.value);
      outputDisplay.textContent = v;
      const h = 30 + (v - 20) * (140 / 160);
      scratchHead.style.height = h + 'px';
    });
    updateOutputModel(100);

    // 解析上传: #力反馈数据#抓痒头输出反馈量#
    function parseSensorData(raw) {
      const match = raw.match(/#([\d.]+)#([\d.]+)#/);
      if (match) {
        const force = parseFloat(match[1]);
        const feedback = parseInt(match[2]);
        if (!isNaN(force) && !isNaN(feedback)) {
          forceValSpan.textContent = force.toFixed(1);
          feedbackValSpan.textContent = feedback;
          addLog(`📥 力反馈:${force.toFixed(1)} 反馈量:${feedback}`, 'rx');
          return true;
        }
      }
      return false;
    }

    function onNotification(event) {
      const val = event.target.value;
      if (!val) return;
      const raw = new TextDecoder('utf-8').decode(val).trim();
      addLog(`原始: ${raw}`, 'rx');
      parseSensorData(raw);
    }

    async function sendCommand(cmd) {
      if (!isConnected || !writeChar) {
        addLog('未连接，无法发送', 'tx');
        return;
      }
      try {
        await writeChar.writeValue(new TextEncoder().encode(cmd));
        addLog(`📤 下发: ${cmd}`, 'tx');
      } catch(e) {
        addLog(`发送失败: ${e.message}`, 'tx');
      }
    }

    sendCmdBtn.addEventListener('click', () => {
      const value = parseInt(outputSlider.value);
      const cmd = `${value}#`;
      sendCommand(cmd);
    });

    // 蓝牙操作
    async function scan() {
      if (!navigator.bluetooth) { alert('需要Web Bluetooth'); return; }
      const svc = serviceUuidInput.value.trim();
      if (!svc) return alert('输入服务UUID');
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [svc] }],
          optionalServices: [svc]
        });
        bluetoothDevice = device;
        connectBtn.disabled = false;
        addLog(`已选择设备: ${device.name || device.id}`);
      } catch(e) {
        if (!e.message.includes('cancelled')) addLog(`扫描错误: ${e.message}`);
      }
    }

    async function connect() {
      if (!bluetoothDevice) return;
      const svc = serviceUuidInput.value.trim();
      const ntf = notifyUuidInput.value.trim();
      const wrt = writeUuidInput.value.trim();
      try {
        gattServer = await bluetoothDevice.gatt.connect();
        const service = await gattServer.getPrimaryService(svc);
        notifyChar = await service.getCharacteristic(ntf);
        await notifyChar.startNotifications();
        notifyChar.addEventListener('characteristicvaluechanged', onNotification);
        if (wrt) {
          try { writeChar = await service.getCharacteristic(wrt); } catch(e) {}
        }
        updateConnectionUI(true);
        bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnect);
        addLog('✅ 蓝牙已连接');
      } catch(e) {
        addLog(`连接失败: ${e.message}`);
        updateConnectionUI(false);
      }
    }

    function onDisconnect() {
      addLog('设备断开');
      if (notifyChar) notifyChar.removeEventListener('characteristicvaluechanged', onNotification);
      notifyChar = null;
      writeChar = null;
      updateConnectionUI(false);
    }

    function disconnect() {
      if (bluetoothDevice && bluetoothDevice.gatt.connected) bluetoothDevice.gatt.disconnect();
      else onDisconnect();
    }

    // 模拟数据
    function simulateData() {
      const force = (Math.random() * 5).toFixed(1);
      const feedback = Math.floor(Math.random() * 160 + 20);
      const raw = `#${force}#${feedback}#`;
      addLog(`模拟接收: ${raw}`, 'rx');
      parseSensorData(raw);
    }

    configToggleBtn.addEventListener('click', ()=> configPanel.style.display = configPanel.style.display==='none'?'flex':'none');
    scanBtn.addEventListener('click', scan);
    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    simulateBtn.addEventListener('click', simulateData);

    updateConnectionUI(false);
    addLog('抓痒头调试助手已启动，可先模拟数据');
  })();
</script>
</body>
</html>
