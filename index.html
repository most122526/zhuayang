<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>江理工 · 校园导航播报</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #0b1a2f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      color: #e0e8f0;
    }
    .phone-frame {
      max-width: 420px;
      width: 100%;
      background: #0f1a2b;
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 0 0 2px #2a3a4e;
      padding: 16px 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      border: 1px solid #3e5670;
      overflow: hidden;
    }
    .status-bar-phone {
      display: flex;
      justify-content: space-between;
      padding: 0 8px;
      font-size: 0.7rem;
      color: #9aaec9;
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a2e42;
      border-radius: 30px;
      padding: 8px 16px;
      border: 1px solid #3e5a78;
    }
    .app-header i { color:#f1c40f; font-size:1.2rem; }
    .app-header h1 { font-size:1rem; font-weight:700; }
    .panel {
      background: #162433;
      border-radius: 24px;
      padding: 12px;
      border: 1px solid #2e4055;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }
    .section-title {
      font-weight:700; font-size:0.8rem; color:#b0c6dc;
      display:flex; align-items:center; gap:6px;
      border-bottom:1px solid #2a3f53; padding-bottom:6px;
    }
    .map-container {
      width:100%; height:280px; border-radius:18px; overflow:hidden;
      border:1px solid #3e5a78; background:#0a121c;
    }
    .search-box {
      display:flex; gap:6px; align-items:center;
    }
    .search-box input {
      flex:1; background:#0a121c; border:1px solid #4b6f92;
      color:white; padding:8px 14px; border-radius:22px; font-size:0.7rem; outline:none;
    }
    .btn {
      background:#2c4b6e; border:none; padding:6px 12px; border-radius:20px;
      font-weight:600; font-size:0.65rem; color:white; cursor:pointer;
      display:flex; align-items:center; gap:4px; border:1px solid #4b6f92;
      white-space:nowrap; transition:0.2s;
    }
    .btn:active { transform:scale(0.95); }
    .btn-accent { background:#e67e22; border-color:#f39c12; }
    .btn-success { background:#1e7a3e; border-color:#2ecc71; }
    .btn-warning { background:#b8730a; border-color:#f1c40f; }
    .btn-danger { background:#9b1d1d; border-color:#e74c3c; }
    .btn-outline { background:transparent; border:1px solid #4b6f92; color:#b0c6dc; }
    .btn-detector {
      background: #1e3a5f;
      border: 2px solid #3498db;
      color: #fff;
      padding: 10px 18px;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(52,152,219,0.3);
    }
    .btn-detector:disabled { opacity:0.6; }
    .voice-bar {
      background:#1e2e40; border-radius:18px; padding:8px 14px;
      display:flex; align-items:center; gap:8px; font-size:0.7rem;
    }
    .voice-bar i { color:#2ecc71; }
    .toast-message {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:#27ae60; color:white; padding:8px 22px; border-radius:20px;
      font-weight:600; font-size:0.8rem; z-index:999; opacity:0; transition:opacity 0.3s;
      pointer-events:none;
    }
    .toast-message.show { opacity:1; }
    .toast-message.error { background:#c0392b; }

    /* 底部蓝牙面板 */
    .bt-manager {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:rgba(15,25,35,0.97); border-top:2px solid #2e4055;
      border-radius:28px 28px 0 0; padding:12px; max-height:70vh;
      overflow-y:auto; transform:translateY(100%); transition:transform 0.35s ease;
      margin:0 auto; max-width:420px; box-shadow:0 -10px 30px rgba(0,0,0,0.5);
    }
    .bt-manager.open { transform:translateY(0); }
    .toggle-bt-btn {
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:51;
      background:#1e3a5f; color:white; border:2px solid #3498db;
      padding:10px 24px; border-radius:30px; font-weight:700; font-size:0.8rem;
      cursor:pointer; display:flex; align-items:center; gap:8px;
      box-shadow:0 4px 20px rgba(52,152,219,0.3);
    }
    .bt-device {
      background:#1c2e41; border-radius:14px; padding:8px; display:flex;
      align-items:center; justify-content:space-between; border:1px solid #36506b; margin-bottom:6px;
    }
    .bt-device i { color:#3498db; font-size:1rem; }
    .bt-info { flex:1; margin:0 8px; }
    .bt-name { font-weight:700; font-size:0.7rem; }
    .bt-status { font-size:0.55rem; color:#7f95b2; }
    .bt-actions { display:flex; gap:4px; }
    .uuid-row { display:flex; gap:4px; font-size:0.55rem; align-items:center; flex-wrap:wrap; }
    .uuid-row input { background:#0a121c; border:1px solid #3e5a78; color:#aaa; padding:4px 6px; border-radius:12px; width:110px; font-family:monospace; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar-phone">
    <span>9:41</span>
    <span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span>
  </div>
  <div class="app-header">
    <i class="fas fa-map-marked-alt"></i>
    <div>
      <h1>江理工导航</h1>
      <span style="font-size:0.55rem; color:#7f95b2;">蓝牙信标 · 语音导游</span>
    </div>
  </div>

  <!-- 地图区域 -->
  <div class="map-container" id="mapContainer">
    <div style="padding:20px; text-align:center; color:#7f95b2;">地图加载中...</div>
  </div>

  <!-- 搜索与检测按钮 -->
  <div class="panel">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索图书馆、体育馆、行政楼...">
      <button class="btn btn-warning" id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <button class="btn-detector" id="detectBeaconBtn">
      <i class="fas fa-bluetooth-b"></i> 检测蓝牙信标
    </button>
    <div class="voice-bar" id="voiceBar">
      <i class="fas fa-volume-up"></i>
      <span id="voiceText" style="flex:1;">等待导航指令...</span>
      <span style="font-size:0.6rem; color:#7f95b2;" id="voiceTime"></span>
      <button class="btn btn-outline" id="stopVoiceBtn" style="padding:4px 10px;"><i class="fas fa-volume-mute"></i></button>
    </div>
  </div>
</div>

<!-- 底部蓝牙管理按钮 -->
<button class="toggle-bt-btn" id="toggleBtBtn"><i class="fas fa-bluetooth-b"></i> 蓝牙管理</button>

<!-- 底部蓝牙面板 -->
<div class="bt-manager" id="btManager">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <span style="font-weight:700; font-size:0.9rem;"><i class="fas fa-bluetooth"></i> 蓝牙信标管理</span>
    <button class="btn btn-outline" id="closeBtBtn" style="padding:4px 12px;"><i class="fas fa-times"></i></button>
  </div>
  <div class="uuid-row" style="margin-bottom:8px;">
    <span>服务UUID</span>
    <input id="serviceUuid" value="0000fff0-0000-1000-8000-00805f9b34fb">
    <span>写入UUID</span>
    <input id="writeUuid" value="0000fff2-0000-1000-8000-00805f9b34fb">
  </div>
  <div id="btDeviceList" style="display:flex; flex-direction:column; gap:6px;"></div>
  <div style="margin-top:8px; font-size:0.65rem; color:#b0c6dc;">
    <i class="fas fa-info-circle"></i> 配对顺序对应指令：1→A, 2→B, 3→C
  </div>
</div>

<div class="toast-message" id="toast"></div>

<script>
  (function() {
    // 高德地图配置
    const AMAP_KEY = '6d2f2e12162bdea11ad316ecd445ebe4';
    const AMAP_SECRET = '7ea6cc8dad3a9af11642f487735e0766';
    const CAMPUS_CENTER = [119.918224, 31.750682];

    // 信标指令映射
    const BEACON_LETTERS = ['A', 'B', 'C'];
    let beacons = [null, null, null];
    let beaconNames = ['', '', ''];        // 已保存的信标名称
    let connectedBeacons = [false, false, false];
    let writeChars = [null, null, null];
    let gattServers = [null, null, null];

    let mapInstance = null;
    let currentPosition = CAMPUS_CENTER;
    let voiceEnabled = true;
    let walkingRoute = null;

    // 校园建筑数据
    const buildings = [
      { name: '图书馆', lng: 119.9178, lat: 31.7505, beaconId: 2, desc: '常州高校最大图书馆，9层馆舍' },
      { name: '行政楼(20#)', lng: 119.9180, lat: 31.7498, beaconId: 1, desc: '学校行政办公主楼' },
      { name: '体育馆', lng: 119.9192, lat: 31.7518, beaconId: 2, desc: '主体育馆，内含篮球场与乒乓馆' },
      { name: '羽毛球馆', lng: 119.9198, lat: 31.7530, beaconId: 3, desc: '西苑宿舍后方，专业羽毛球场' },
      { name: '博学楼(59#)', lng: 119.9185, lat: 31.7512, beaconId: 1, desc: '江苏理工学院主教楼' },
      { name: '第一食堂', lng: 119.9175, lat: 31.7520, beaconId: 3, desc: '主校区第一食堂' },
      { name: '第二食堂(46#)', lng: 119.9182, lat: 31.7523, beaconId: 3, desc: '主校区第二食堂' },
      { name: '宿舍楼群', lng: 119.9195, lat: 31.7525, beaconId: 3, desc: '学生宿舍区域' },
      { name: '凌波桥', lng: 119.9172, lat: 31.7508, beaconId: 2, desc: '凌波湖畔标志性桥梁' },
    ];

    // DOM元素
    const btDeviceList = document.getElementById('btDeviceList');
    const detectBeaconBtn = document.getElementById('detectBeaconBtn');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const voiceText = document.getElementById('voiceText');
    const voiceTime = document.getElementById('voiceTime');
    const toast = document.getElementById('toast');
    const stopVoiceBtn = document.getElementById('stopVoiceBtn');
    const toggleBtBtn = document.getElementById('toggleBtBtn');
    const btManager = document.getElementById('btManager');
    const closeBtBtn = document.getElementById('closeBtBtn');
    const serviceUuidInput = document.getElementById('serviceUuid');
    const writeUuidInput = document.getElementById('writeUuid');

    // Toast
    function showToast(msg, isError=false) {
      toast.textContent = msg;
      toast.className = 'toast-message ' + (isError ? 'error' : '') + ' show';
      setTimeout(() => { toast.className = 'toast-message'; }, 2500);
    }

    // 语音
    function speak(text) {
      if (!voiceEnabled) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN'; utter.rate = 1.1;
        utter.onstart = () => {
          voiceText.textContent = text;
          voiceTime.textContent = new Date().toLocaleTimeString('zh-CN');
        };
        window.speechSynthesis.speak(utter);
      }
    }
    stopVoiceBtn.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      stopVoiceBtn.innerHTML = voiceEnabled ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
      if (!voiceEnabled) window.speechSynthesis.cancel();
    });

    // 蓝牙面板折叠
    toggleBtBtn.addEventListener('click', () => btManager.classList.toggle('open'));
    closeBtBtn.addEventListener('click', () => btManager.classList.remove('open'));

    // 渲染蓝牙管理卡片
    function renderBeaconUI() {
      let html = '';
      for (let i=0; i<3; i++) {
        const connected = connectedBeacons[i];
        const name = beaconNames[i] || `信标 ${i+1}`;
        html += `
          <div class="bt-device">
            <i class="fas fa-${connected?'bluetooth':'bluetooth-b'}" style="color:${connected?'#2ecc71':'#5c6b7a'}"></i>
            <div class="bt-info">
              <div class="bt-name">${name} <span style="color:#f1c40f;">[${BEACON_LETTERS[i]}]</span></div>
              <div class="bt-status">${connected?'✓ 已连接':'未连接'}</div>
            </div>
            <div class="bt-actions">
              <button class="btn" id="scanBtn${i}">扫描</button>
              <button class="btn btn-success" id="connectBtn${i}" ${connected?'disabled':''}>连接</button>
            </div>
          </div>
        `;
      }
      btDeviceList.innerHTML = html;
      for (let i=0; i<3; i++) {
        document.getElementById(`scanBtn${i}`)?.addEventListener('click', ()=> scanAndSaveBeacon(i));
        document.getElementById(`connectBtn${i}`)?.addEventListener('click', ()=> connectBeacon(i));
      }
    }

    async function scanAndSaveBeacon(index) {
      if (!navigator.bluetooth) { showToast('浏览器不支持蓝牙', true); return; }
      const svc = serviceUuidInput.value.trim();
      if (!svc) { showToast('填写服务UUID', true); return; }
      try {
        showToast(`正在扫描信标 ${index+1}...`);
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [svc] }],
          optionalServices: [svc]
        });
        beacons[index] = device;
        beaconNames[index] = device.name || `信标${index+1}`;
        showToast(`已保存: ${beaconNames[index]}`);
        renderBeaconUI();
        document.getElementById(`connectBtn${index}`).disabled = false;
      } catch(e) {
        if (!e.message.includes('cancelled')) showToast('扫描失败', true);
      }
    }

    async function connectBeacon(index) {
      const device = beacons[index];
      if (!device) { showToast('请先扫描设备', true); return; }
      const svc = serviceUuidInput.value.trim();
      const wUuid = writeUuidInput.value.trim();
      try {
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(svc);
        const writeChar = await service.getCharacteristic(wUuid);
        gattServers[index] = server;
        writeChars[index] = writeChar;
        connectedBeacons[index] = true;
        device.addEventListener('gattserverdisconnected', () => {
          connectedBeacons[index] = false;
          writeChars[index] = null;
          renderBeaconUI();
          showToast(`信标${index+1}已断开`, true);
        });
        renderBeaconUI();
        showToast(`信标${index+1}已连接`);
      } catch(e) {
        showToast('连接失败: '+e.message, true);
      }
    }

    async function sendCommand(index, letter, silent=false) {
      if (!connectedBeacons[index] || !writeChars[index]) return false;
      try {
        const data = new TextEncoder().encode(letter);
        if (writeChars[index].properties?.writeWithoutResponse) {
          await writeChars[index].writeValueWithoutResponse(data);
        } else {
          await writeChars[index].writeValue(data);
        }
        if (!silent) console.log(`指令 ${letter} 已发送至信标${index+1}`);
        return true;
      } catch(e) {
        console.error('发送失败:', e);
        return false;
      }
    }

    // 核心功能：检测蓝牙信标
    detectBeaconBtn.addEventListener('click', async () => {
      if (!navigator.bluetooth) {
        showToast('浏览器不支持蓝牙', true);
        return;
      }
      // 检查是否有已保存的信标名称
      const savedNames = beaconNames.filter(n => n !== '');
      if (savedNames.length === 0) {
        showToast('请先在蓝牙管理中保存信标名称', true);
        return;
      }

      const svc = serviceUuidInput.value.trim();
      if (!svc) {
        showToast('请填写服务UUID', true);
        return;
      }

      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [svc] }],
          optionalServices: [svc]
        });

        const deviceName = device.name || '';
        // 在已保存的信标中查找匹配名称
        const foundIndex = beaconNames.findIndex(name => name === deviceName);
        if (foundIndex === -1) {
          showToast('未识别：该设备不在已保存的信标列表中', true);
          return;
        }

        // 连接设备并下发对应指令
        const letter = BEACON_LETTERS[foundIndex];
        showToast(`识别到信标${foundIndex+1}：${deviceName}，正在连接...`);

        // 如果已经连接，直接发送指令
        if (connectedBeacons[foundIndex]) {
          const sent = await sendCommand(foundIndex, letter);
          if (sent) {
            showToast(`✓ 已向信标${foundIndex+1}发送指令 ${letter}`);
            speak(`检测到信标${foundIndex+1}，已发送指令${letter}`);
          }
          return;
        }

        // 否则连接并发送
        const wUuid = writeUuidInput.value.trim();
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(svc);
        const writeChar = await service.getCharacteristic(wUuid);
        gattServers[foundIndex] = server;
        writeChars[foundIndex] = writeChar;
        connectedBeacons[foundIndex] = true;

        device.addEventListener('gattserverdisconnected', () => {
          connectedBeacons[foundIndex] = false;
          writeChars[foundIndex] = null;
          renderBeaconUI();
          showToast(`信标${foundIndex+1}已断开`, true);
        });

        // 下发指令
        await sendCommand(foundIndex, letter, true);
        renderBeaconUI();
        showToast(`✓ 已连接信标${foundIndex+1}并发送指令 ${letter}`);
        speak(`检测到信标${foundIndex+1}，已发送指令${letter}`);
      } catch(e) {
        if (!e.message.includes('cancelled') && !e.message.includes('取消')) {
          showToast('扫描失败: ' + e.message, true);
        }
      }
    });

    // 初始化高德地图
    function initMap() {
      if (typeof AMap === 'undefined') {
        setTimeout(initMap, 500);
        return;
      }
      mapInstance = new AMap.Map('mapContainer', {
        center: CAMPUS_CENTER,
        zoom: 16,
        viewMode: '2D',
        resizeEnable: true,
      });

      // 定位
      AMap.plugin('AMap.Geolocation', () => {
        const geolocation = new AMap.Geolocation({ enableHighAccuracy: true, timeout: 5000 });
        mapInstance.addControl(geolocation);
        geolocation.getCurrentPosition((status, result) => {
          if (status === 'complete' && result.position) {
            currentPosition = [result.position.lng, result.position.lat];
            mapInstance.setCenter(currentPosition);
            addCurrentPositionMarker();
          }
        });
      });

      // 添加建筑标记
      buildings.forEach(b => {
        const marker = new AMap.Marker({
          position: [b.lng, b.lat],
          title: b.name,
          map: mapInstance,
        });
        marker.on('click', () => navigateToBuilding(b));
      });

      // 搜索插件
      AMap.plugin(['AMap.AutoComplete'], () => {
        const autoComplete = new AMap.AutoComplete({ input: 'searchInput', city: '常州' });
        autoComplete.on('select', (e) => {
          if (e.poi && e.poi.location) {
            const loc = [e.poi.location.lng, e.poi.location.lat];
            mapInstance.setCenter(loc);
            mapInstance.setZoom(17);
            const matched = buildings.find(b => b.name.includes(e.poi.name) || e.poi.name.includes(b.name));
            if (matched) navigateToBuilding(matched);
          }
        });
      });
    }

    function addCurrentPositionMarker() {
      new AMap.Marker({
        position: currentPosition,
        title: '我的位置',
        map: mapInstance,
        icon: new AMap.Icon({
          size: new AMap.Size(24, 24),
          image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
          imageSize: new AMap.Size(24, 24),
        }),
      });
    }

    async function navigateToBuilding(building) {
      const beaconIdx = building.beaconId - 1;
      const letter = BEACON_LETTERS[beaconIdx];
      mapInstance.setCenter([building.lng, building.lat]);
      mapInstance.setZoom(18);

      if (walkingRoute) mapInstance.remove(walkingRoute);
      walkingRoute = new AMap.Polyline({
        path: [currentPosition, [building.lng, building.lat]],
        strokeColor: '#27ae60',
        strokeWeight: 4,
        strokeStyle: 'dashed',
        map: mapInstance,
      });

      if (connectedBeacons[beaconIdx]) {
        await sendCommand(beaconIdx, letter, true);
      }
      const msg = `正在导航至${building.name}，${building.desc}，信标${beaconIdx+1}指令${letter}`;
      speak(msg);
      showToast(`📍 ${building.name} → 信标${beaconIdx+1} ${letter}`);
    }

    searchBtn.addEventListener('click', () => {
      const val = searchInput.value.trim();
      if (!val) return;
      const matched = buildings.find(b => b.name.includes(val));
      if (matched) navigateToBuilding(matched);
      else showToast('未找到该建筑', true);
    });

    // 加载地图脚本
    function loadMap() {
      const script = document.createElement('script');
      script.src = `https://webapi.amap.com/maps?v=2.0&key=${AMAP_KEY}&jscode=${AMAP_SECRET}&plugin=AMap.PlaceSearch,AMap.AutoComplete,AMap.Geocoder,AMap.Geolocation,AMap.Walking`;
      script.onload = initMap;
      document.head.appendChild(script);
    }

    // 初始化
    renderBeaconUI();
    loadMap();
  })();
</script>
</body>
</html>
