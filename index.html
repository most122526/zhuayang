<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抓仰头控制界面 · 江理工</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card2: #1a2332;
            --accent: #38bdf8;
            --accent2: #06b6d4;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --border: #334155;
            --border2: #1e293b;
            --radius: 18px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'JetBrains Mono', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #0b1121 40%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text);
            -webkit-user-select: none;
            user-select: none;
        }
        .phone {
            max-width: 440px;
            width: 100%;
            background: var(--bg);
            border-radius: 32px;
            padding: 16px 14px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid #2a3545;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            gap: 10px;
        }
        .header .title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, #0c4a6e, #0e7490);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(14, 116, 144, 0.4);
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #e2e8f0;
            line-height: 1.2;
        }
        .header .subtitle {
            font-size: 0.65rem;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .header .badge-school {
            font-size: 0.6rem;
            padding: 4px 10px;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        /* 状态指示灯条 */
        .status-strip {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-chip {
            flex: 1;
            min-width: 80px;
            background: var(--card2);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .status-chip .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #475569;
            flex-shrink: 0;
            transition: 0.3s;
        }
        .status-chip .dot.connected {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            animation: dotPulse 2s infinite;
        }
        .status-chip .dot.cloud {
            background: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .status-chip .dot.cloud.ok {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
            }
            50% {
                box-shadow: 0 0 16px rgba(16, 185, 129, 0.8);
            }
        }
        .status-chip .chip-label {
            color: var(--text2);
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-chip .chip-val {
            color: #e2e8f0;
            font-weight: 700;
            font-size: 0.68rem;
        }

        /* 蓝牙配置面板 */
        .config-panel {
            display: none;
            background: var(--card2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--border);
        }
        .config-panel.open {
            display: flex;
        }
        .config-panel input {
            background: #0f172a;
            border: 1px solid var(--border);
            color: #e2e8f0;
            padding: 7px 10px;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            flex: 1;
            outline: none;
            min-width: 0;
        }
        .config-panel input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08);
        }
        .config-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .config-row label {
            font-size: 0.55rem;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
            min-width: 50px;
        }
        .btn {
            background: #1e3348;
            border: 1px solid #334155;
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.65rem;
            color: #e2e8f0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.15s;
            white-space: nowrap;
            font-family: inherit;
            outline: none;
        }
        .btn:active {
            transform: scale(0.95);
            background: #2a4058;
        }
        .btn-primary {
            background: #0e7490;
            border-color: #0891b2;
            color: #fff;
        }
        .btn-primary:active {
            background: #0c5e72;
        }
        .btn-accent {
            background: #0c4a6e;
            border-color: #0e7490;
            color: #7dd3fc;
        }
        .btn-warn {
            background: #7f1d1d;
            border-color: #991b1b;
            color: #fecaca;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.6rem;
            border-radius: 14px;
        }

        /* 数据接收展示区 */
        .data-receive-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .data-receive-card .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .data-receive-card .section-label i {
            color: var(--accent);
            font-size: 0.7rem;
        }
        .reading-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .reading-box {
            flex: 1;
            min-width: 110px;
            background: var(--card2);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            text-align: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .reading-box .reading-value {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #e2e8f0;
            font-family: var(--font-mono);
            line-height: 1;
            transition: 0.3s;
        }
        .reading-box .reading-value.updated {
            animation: valueFlash 0.5s ease;
        }
        @keyframes valueFlash {
            0%,
            100% {
                color: #e2e8f0;
            }
            50% {
                color: #38bdf8;
                transform: scale(1.04);
            }
        }
        .reading-box .reading-unit {
            font-size: 0.6rem;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .reading-box .reading-label {
            font-size: 0.62rem;
            color: var(--text2);
            font-weight: 500;
            margin-top: 4px;
        }
        .contact-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .contact-indicator.contact-yes {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        .contact-indicator.contact-no {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        .contact-indicator.contact-unknown {
            background: rgba(100, 116, 139, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
        .last-update-text {
            font-size: 0.58rem;
            color: var(--text3);
            text-align: right;
            font-family: var(--font-mono);
        }

        /* 舵机角度控制区 */
        .servo-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .servo-card .section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .servo-card .section-label i {
            color: var(--accent2);
            font-size: 0.7rem;
        }
        .servo-display-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .servo-angle-display {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(var(--accent2) 0deg,
                    var(--accent2) calc(var(--angle-deg) * 1deg),
                    #1e3348 calc(var(--angle-deg) * 1deg),
                    #1e3348 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 3px solid #334155;
            transition: background 0.15s;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.25);
        }
        .servo-angle-display .angle-num {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            font-family: var(--font-mono);
            z-index: 1;
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
        }
        .servo-angle-display .angle-deg-symbol {
            font-size: 0.7rem;
            color: #94a3b8;
            position: absolute;
            bottom: 16px;
            font-weight: 600;
        }
        .servo-slider-group {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .servo-slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 28px;
            border-radius: 14px;
            background: linear-gradient(90deg, #0c4a6e 0%, #0e7490 50%, #06b6d4 100%);
            outline: none;
            cursor: pointer;
            border: 2px solid #334155;
        }
        .servo-slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #06b6d4;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(6, 182, 212, 0.5);
            transition: 0.15s;
        }
        .servo-slider-group input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(6, 182, 212, 0.7);
        }
        .servo-preset-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .servo-preset-row .btn {
            flex: 1;
            min-width: 36px;
            justify-content: center;
            font-size: 0.6rem;
            padding: 6px 8px;
            border-radius: 14px;
        }
        .servo-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .servo-input-row input {
            width: 70px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: #e2e8f0;
            padding: 6px 8px;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-align: center;
            outline: none;
        }
        .servo-input-row input:focus {
            border-color: var(--accent2);
        }

        /* 日志区域 */
        .log-card {
            background: var(--card2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-card .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-box {
            background: #0b1121;
            border-radius: 10px;
            padding: 8px 10px;
            height: 110px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: #94a3b8;
            border: 1px solid #1a2332;
            line-height: 1.6;
            word-break: break-all;
        }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #111827;
        }
        .log-entry.rx {
            color: #6ee7b7;
        }
        .log-entry.tx {
            color: #7dd3fc;
        }
        .log-entry.cloud-log {
            color: #fbbf24;
        }
        .log-entry.system {
            color: #94a3b8;
        }
        .log-entry.error {
            color: #fca5a5;
        }
        .timestamp {
            color: #475569;
            margin-right: 6px;
            font-size: 0.52rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 10px 22px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 0.7rem;
            background: #0e7490;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.35s, toastOut 0.35s 2s forwards;
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-16px);
            }
        }
        .toast.warn {
            background: #b45309;
        }
        .toast.error {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="phone" id="app">
        <!-- 标题栏 -->
        <div class="header">
            <div class="title-group">
                <div class="logo-icon">🦾</div>
                <div>
                    <h1>抓仰头控制界面</h1>
                    <div class="subtitle">Head Grasp & Tilt · 实时监控</div>
                </div>
            </div>
            <span class="badge-school">江理工</span>
        </div>

        <!-- 状态指示灯 -->
        <div class="status-strip">
            <div class="status-chip" id="bleStatusChip">
                <div class="dot" id="bleDot"></div>
                <div>
                    <div class="chip-label">蓝牙</div>
                    <div class="chip-val" id="bleStatusText">未连接</div>
                </div>
            </div>
            <div class="status-chip" id="cloudStatusChip">
                <div class="dot" id="cloudDot"></div>
                <div>
                    <div class="chip-label">云端</div>
                    <div class="chip-val" id="cloudStatusText">待上传</div>
                </div>
            </div>
            <div class="status-chip">
                <div style="font-size:0.7rem;">📶</div>
                <div>
                    <div class="chip-label">数据计数</div>
                    <div class="chip-val" id="dataCount">0</div>
                </div>
            </div>
        </div>

        <!-- 蓝牙配置面板 -->
        <div class="config-panel" id="configPanel">
            <div class="config-row">
                <label>服务UUID</label>
                <input id="serviceUuid" value="0000fff0-0000-1000-8000-00805f9b34fb" placeholder="服务UUID">
            </div>
            <div class="config-row">
                <label>通知UUID</label>
                <input id="notifyUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="通知UUID">
            </div>
            <div class="config-row">
                <label>写入UUID</label>
                <input id="writeUuid" value="0000fff1-0000-1000-8000-00805f9b34fb" placeholder="写入UUID">
            </div>
            <div class="config-row" style="gap:8px;">
                <button class="btn btn-accent" id="scanBtn"><i class="fas fa-search"></i> 扫描设备</button>
                <button class="btn btn-primary" id="connectBtn" disabled>🔗 连接</button>
                <button class="btn btn-warn" id="disconnectBtn" disabled>✕ 断开</button>
                <button class="btn btn-sm" id="configToggleBtn" style="margin-left:auto;">
                    <i class="fas fa-chevron-up"></i> 收起
                </button>
            </div>
        </div>

        <!-- 蓝牙操作快捷栏（配置收起时显示） -->
        <div class="config-row" id="quickBtns" style="gap:8px; flex-wrap:wrap;">
            <button class="btn btn-sm" id="configShowBtn" style="display:flex; align-items:center; gap:4px;">
                <i class="fas fa-cog"></i> 蓝牙配置
            </button>
            <button class="btn btn-accent btn-sm" id="scanBtn2"><i class="fas fa-search"></i> 扫描</button>
            <button class="btn btn-primary btn-sm" id="connectBtn2" disabled>🔗 连接</button>
            <button class="btn btn-warn btn-sm" id="disconnectBtn2" disabled>✕ 断开</button>
        </div>

        <!-- 数据接收展示 -->
        <div class="data-receive-card">
            <div class="section-label">
                <i class="fas fa-download"></i> 蓝牙接收数据 · 实时解析
            </div>
            <div class="reading-row">
                <div class="reading-box" id="forceBox">
                    <div class="reading-value" id="forceValue">--</div>
                    <div class="reading-unit">N / 单位</div>
                    <div class="reading-label">📐 力反馈数据</div>
                </div>
                <div class="reading-box" id="contactBox">
                    <div style="margin-bottom:6px;">
                        <span class="contact-indicator contact-unknown" id="contactIndicator">
                            <i class="fas fa-circle-question"></i> 等待数据
                        </span>
                    </div>
                    <div class="reading-unit" style="margin-top:4px;">检测状态</div>
                    <div class="reading-label">🖐️ 是否接触背部</div>
                </div>
            </div>
            <div class="last-update-text" id="lastUpdateTime">最后更新: --</div>
        </div>

        <!-- 舵机角度控制 -->
        <div class="servo-card">
            <div class="section-label">
                <i class="fas fa-upload"></i> 舵机角度控制 · 蓝牙实时下发
            </div>
            <div class="servo-display-row">
                <div class="servo-angle-display" id="servoAngleDisplay" style="--angle-deg:90;">
                    <span class="angle-num" id="servoAngleNum">90</span>
                    <span class="angle-deg-symbol">°</span>
                </div>
                <div class="servo-slider-group">
                    <input type="range" id="servoSlider" min="0" max="180" value="90" step="1" title="舵机角度滑块">
                    <div style="display:flex;justify-content:space-between;font-size:0.55rem;color:var(--text3);padding:0 4px;">
                        <span>0°</span><span>45°</span><span>90°</span><span>135°</span><span>180°</span>
                    </div>
                </div>
            </div>
            <div class="servo-input-row">
                <span style="font-size:0.6rem;color:var(--text3);font-weight:600;">精确角度:</span>
                <input type="number" id="servoInput" min="0" max="180" value="90" step="1">
                <span style="font-size:0.6rem;color:var(--text3);">°</span>
                <button class="btn btn-accent btn-sm" id="servoSetBtn">设置</button>
                <span style="font-size:0.55rem;color:var(--text3);margin-left:4px;">下发格式: #角度#</span>
            </div>
            <div class="servo-preset-row">
                <button class="btn btn-sm servo-preset" data-angle="0">0°</button>
                <button class="btn btn-sm servo-preset" data-angle="30">30°</button>
                <button class="btn btn-sm servo-preset" data-angle="60">60°</button>
                <button class="btn btn-sm servo-preset" data-angle="90">90°</button>
                <button class="btn btn-sm servo-preset" data-angle="120">120°</button>
                <button class="btn btn-sm servo-preset" data-angle="150">150°</button>
                <button class="btn btn-sm servo-preset" data-angle="180">180°</button>
            </div>
        </div>

        <!-- 日志 -->
        <div class="log-card">
            <div class="log-header">
                <span style="font-size:0.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;">
                    📋 事件日志
                </span>
                <button class="btn btn-sm" id="clearLogBtn" style="font-size:0.5rem;padding:3px 8px;">清空</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry system"><span class="timestamp">--:--:--</span> 抓仰头控制界面已就绪</div>
                <div class="log-entry system"><span class="timestamp">--:--:--</span> 巴法云UID: fb63beb6... | 主题: zhuayanghead</div>
                <div class="log-entry system"><span class="timestamp">--:--:--</span> 请配置蓝牙并连接设备</div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const bleDot = document.getElementById('bleDot');
            const bleStatusText = document.getElementById('bleStatusText');
            const cloudDot = document.getElementById('cloudDot');
            const cloudStatusText = document.getElementById('cloudStatusText');
            const dataCountEl = document.getElementById('dataCount');
            const configPanel = document.getElementById('configPanel');
            const configToggleBtn = document.getElementById('configToggleBtn');
            const configShowBtn = document.getElementById('configShowBtn');
            const quickBtns = document.getElementById('quickBtns');
            const serviceUuidInput = document.getElementById('serviceUuid');
            const notifyUuidInput = document.getElementById('notifyUuid');
            const writeUuidInput = document.getElementById('writeUuid');
            const scanBtn = document.getElementById('scanBtn');
            const scanBtn2 = document.getElementById('scanBtn2');
            const connectBtn = document.getElementById('connectBtn');
            const connectBtn2 = document.getElementById('connectBtn2');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const disconnectBtn2 = document.getElementById('disconnectBtn2');
            const forceValueEl = document.getElementById('forceValue');
            const contactIndicator = document.getElementById('contactIndicator');
            const lastUpdateTime = document.getElementById('lastUpdateTime');
            const servoSlider = document.getElementById('servoSlider');
            const servoAngleNum = document.getElementById('servoAngleNum');
            const servoAngleDisplay = document.getElementById('servoAngleDisplay');
            const servoInput = document.getElementById('servoInput');
            const servoSetBtn = document.getElementById('servoSetBtn');
            const logBox = document.getElementById('logBox');
            const clearLogBtn = document.getElementById('clearLogBtn');
            const toastContainer = document.getElementById('toastContainer');

            // ==================== 配置 ====================
            const BEMFA_UID = 'fb63beb6921942a7a6ee44b53331075f';
            const BEMFA_TOPIC = 'zhuayanghead';
            let bluetoothDevice = null;
            let gattServer = null;
            let notifyChar = null;
            let writeChar = null;
            let isConnected = false;
            let dataReceiveCount = 0;
            let currentServoAngle = 90;
            let servoSendTimer = null;
            let lastServoSendTime = 0;
            const SERVO_DEBOUNCE_MS = 80;

            // ==================== Toast ====================
            function showToast(msg, type = '') {
                const t = document.createElement('div');
                t.className = 'toast ' + type;
                t.textContent = msg;
                toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }

            // ==================== 日志 ====================
            function addLog(msg, type = 'system') {
                const div = document.createElement('div');
                div.className = `log-entry ${type}`;
                div.innerHTML =
                    `<span class="timestamp">${new Date().toLocaleTimeString('zh-CN', { hour12: false })}</span> ${msg}`;
                logBox.appendChild(div);
                logBox.scrollTop = logBox.scrollHeight;
                if (logBox.children.length > 60) logBox.removeChild(logBox.children[0]);
            }

            clearLogBtn.addEventListener('click', () => {
                logBox.innerHTML = '';
                addLog('日志已清空', 'system');
            });

            // ==================== 配置面板切换 ====================
            function showConfigPanel() {
                configPanel.classList.add('open');
                quickBtns.style.display = 'none';
            }

            function hideConfigPanel() {
                configPanel.classList.remove('open');
                quickBtns.style.display = 'flex';
            }
            configToggleBtn.addEventListener('click', hideConfigPanel);
            configShowBtn.addEventListener('click', showConfigPanel);
            // 初始状态：显示快捷栏，隐藏配置面板
            hideConfigPanel();

            // ==================== 更新UI ====================
            function updateConnectionUI(connected) {
                isConnected = connected;
                bleDot.classList.toggle('connected', connected);
                bleStatusText.textContent = connected ? '已连接' : '未连接';
                connectBtn.disabled = connected || !bluetoothDevice;
                connectBtn2.disabled = connected || !bluetoothDevice;
                disconnectBtn.disabled = !connected;
                disconnectBtn2.disabled = !connected;
                scanBtn.disabled = connected;
                scanBtn2.disabled = connected;
                if (connected) {
                    bleStatusText.style.color = '#6ee7b7';
                } else {
                    bleStatusText.style.color = '#e2e8f0';
                }
            }

            function updateCloudStatus(ok) {
                if (ok) {
                    cloudDot.classList.add('ok');
                    cloudStatusText.textContent = '已上传';
                    cloudStatusText.style.color = '#6ee7b7';
                } else {
                    cloudDot.classList.remove('ok');
                    cloudStatusText.textContent = '待上传';
                    cloudStatusText.style.color = '#e2e8f0';
                }
            }

            function updateDataCount() {
                dataCountEl.textContent = dataReceiveCount;
            }

            // ==================== 蓝牙通知回调 ====================
            function onNotification(event) {
                const val = event.target.value;
                if (!val) return;
                const rawText = new TextDecoder('utf-8').decode(val);
                addLog(`📥 收到: ${rawText}`, 'rx');
                dataReceiveCount++;
                updateDataCount();

                // 解析数据格式: #力反馈数据#是否接触背部#
                parseReceivedData(rawText);

                // 原封不动上传到巴法云
                uploadToBemfa(rawText);
            }

            function parseReceivedData(rawText) {
                // 匹配 #值1#值2# 格式
                const match = rawText.match(/#([^#]*)#([^#]*)#?/);
                if (match && match.length >= 3) {
                    const forceVal = match[1].trim();
                    const contactVal = match[2].trim();
                    // 更新力反馈显示
                    forceValueEl.textContent = forceVal;
                    forceValueEl.classList.remove('updated');
                    void forceValueEl.offsetWidth;
                    forceValueEl.classList.add('updated');
                    // 更新接触状态
                    updateContactIndicator(contactVal);
                    lastUpdateTime.textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
                    addLog(`  解析 → 力反馈: ${forceVal} | 接触背部: ${contactVal}`, 'system');
                } else {
                    // 解析失败，尝试显示原始数据
                    addLog(`  ⚠️ 数据格式无法解析，原始: ${rawText}`, 'error');
                    forceValueEl.textContent = '?';
                    updateContactIndicator(null);
                    lastUpdateTime.textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }) +
                        ' (解析失败)';
                }
            }

            function updateContactIndicator(contactVal) {
                contactIndicator.classList.remove('contact-yes', 'contact-no', 'contact-unknown');
                if (contactVal === '1' || contactVal === 'true' || contactVal === '是' || contactVal === 'yes') {
                    contactIndicator.classList.add('contact-yes');
                    contactIndicator.innerHTML = '<i class="fas fa-circle-check"></i> 已接触背部';
                } else if (contactVal === '0' || contactVal === 'false' || contactVal === '否' || contactVal === 'no') {
                    contactIndicator.classList.add('contact-no');
                    contactIndicator.innerHTML = '<i class="fas fa-circle-xmark"></i> 未接触背部';
                } else if (contactVal && contactVal.trim() !== '') {
                    contactIndicator.classList.add('contact-yes');
                    contactIndicator.innerHTML = `<i class="fas fa-circle-info"></i> ${contactVal}`;
                } else {
                    contactIndicator.classList.add('contact-unknown');
                    contactIndicator.innerHTML = '<i class="fas fa-circle-question"></i> 未知';
                }
            }

            // ==================== 巴法云上传 ====================
           async function uploadToBemfa(rawMsg) {
    try {
        const params = new URLSearchParams();
        params.append('uid', BEMFA_UID);
        params.append('topic', BEMFA_TOPIC);
        params.append('type', '3');          // 与您成功项目一致，使用类型3
        params.append('msg', rawMsg);

        const resp = await fetch('https://apis.bemfa.com/va/postmsg', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        const json = await resp.json();
        if (json.code === 0) {
            updateCloudStatus(true);
            addLog(`☁️ 云端上传成功 → ${rawMsg.substring(0, 50)}${rawMsg.length > 50 ? '...' : ''}`, 'cloud-log');
        } else {
            updateCloudStatus(false);
            addLog(`☁️ 云端上传失败: code=${json.code} msg=${json.msg || '未知'}`, 'error');
        }
    } catch (e) {
        updateCloudStatus(false);
        addLog(`☁️ 云端上传异常: ${e.message}`, 'error');
    }
}

            // ==================== 舵机角度控制 ====================
            function updateServoDisplay(angle) {
                currentServoAngle = angle;
                servoSlider.value = angle;
                servoInput.value = angle;
                servoAngleNum.textContent = angle;
                servoAngleDisplay.style.setProperty('--angle-deg', angle);
            }

            function sendServoAngle(angle) {
                if (!isConnected || !writeChar) {
                    addLog(`⚠️ 蓝牙未连接，无法下发舵机角度 ${angle}°`, 'system');
                    return;
                }
                const cmd = `#${angle}#`;
                writeChar.writeValue(new TextEncoder().encode(cmd))
                    .then(() => {
                        addLog(`📤 舵机下发: ${cmd}`, 'tx');
                        updateServoDisplay(angle);
                    })
                    .catch(e => {
                        addLog(`📤 下发失败: ${e.message}`, 'error');
                    });
            }

            function debouncedSendServo(angle) {
                const now = Date.now();
                if (now - lastServoSendTime < SERVO_DEBOUNCE_MS) {
                    // 清除之前的定时器，设置新的
                    if (servoSendTimer) clearTimeout(servoSendTimer);
                    servoSendTimer = setTimeout(() => {
                        sendServoAngle(angle);
                        lastServoSendTime = Date.now();
                        servoSendTimer = null;
                    }, SERVO_DEBOUNCE_MS);
                } else {
                    sendServoAngle(angle);
                    lastServoSendTime = now;
                }
            }

            // 滑块事件
            servoSlider.addEventListener('input', () => {
                const angle = parseInt(servoSlider.value);
                updateServoDisplay(angle);
                debouncedSendServo(angle);
            });
            servoSlider.addEventListener('change', () => {
                const angle = parseInt(servoSlider.value);
                if (servoSendTimer) {
                    clearTimeout(servoSendTimer);
                    servoSendTimer = null;
                }
                sendServoAngle(angle);
            });

            // 精确输入
            servoSetBtn.addEventListener('click', () => {
                let angle = parseInt(servoInput.value);
                if (isNaN(angle)) angle = 90;
                angle = Math.max(0, Math.min(180, angle));
                updateServoDisplay(angle);
                if (servoSendTimer) {
                    clearTimeout(servoSendTimer);
                    servoSendTimer = null;
                }
                sendServoAngle(angle);
            });
            servoInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    servoSetBtn.click();
                }
            });

            // 预设按钮
            document.querySelectorAll('.servo-preset').forEach(btn => {
                btn.addEventListener('click', () => {
                    const angle = parseInt(btn.dataset.angle);
                    if (isNaN(angle)) return;
                    updateServoDisplay(angle);
                    if (servoSendTimer) {
                        clearTimeout(servoSendTimer);
                        servoSendTimer = null;
                    }
                    sendServoAngle(angle);
                });
            });

            // ==================== 蓝牙扫描/连接/断开 ====================
            async function scan() {
                if (!navigator.bluetooth) {
                    showToast('⚠️ 此浏览器不支持Web Bluetooth', 'error');
                    addLog('❌ 浏览器不支持Web Bluetooth API', 'error');
                    return;
                }
                const svc = serviceUuidInput.value.trim();
                if (!svc) {
                    showToast('⚠️ 请输入服务UUID', 'warn');
                    return;
                }
                try {
                    addLog('🔍 正在扫描蓝牙设备...', 'system');
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ services: [svc] }],
                        optionalServices: [svc],
                    });
                    bluetoothDevice = device;
                    connectBtn.disabled = false;
                    connectBtn2.disabled = false;
                    addLog(`📱 已选择设备: ${device.name || device.id}`, 'system');
                    showToast('✅ 设备已选择，请点击连接');
                } catch (e) {
                    if (!e.message.includes('cancelled') && !e.message.includes('取消')) {
                        addLog(`扫描错误: ${e.message}`, 'error');
                        showToast('扫描失败', 'error');
                    }
                }
            }

            async function connect() {
                if (!bluetoothDevice) {
                    showToast('⚠️ 请先扫描设备', 'warn');
                    return;
                }
                const svc = serviceUuidInput.value.trim();
                const ntf = notifyUuidInput.value.trim();
                const wrt = writeUuidInput.value.trim();
                try {
                    addLog('🔗 正在连接蓝牙...', 'system');
                    gattServer = await bluetoothDevice.gatt.connect();
                    const service = await gattServer.getPrimaryService(svc);
                    notifyChar = await service.getCharacteristic(ntf);
                    await notifyChar.startNotifications();
                    notifyChar.addEventListener('characteristicvaluechanged', onNotification);
                    if (wrt) {
                        try {
                            writeChar = await service.getCharacteristic(wrt);
                            addLog('✅ 写入特征已就绪', 'system');
                        } catch (e) {
                            addLog(`⚠️ 写入特征获取失败: ${e.message}`, 'error');
                        }
                    }
                    updateConnectionUI(true);
                    bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnect);
                    addLog('✅ 蓝牙已成功连接', 'system');
                    showToast('✅ 蓝牙已连接');
                    updateCloudStatus(false);
                } catch (e) {
                    addLog(`连接失败: ${e.message}`, 'error');
                    showToast('连接失败', 'error');
                    updateConnectionUI(false);
                }
            }

            function onDisconnect() {
                addLog('🔌 蓝牙设备已断开', 'system');
                if (notifyChar) {
                    notifyChar.removeEventListener('characteristicvaluechanged', onNotification);
                }
                notifyChar = null;
                writeChar = null;
                updateConnectionUI(false);
                updateCloudStatus(false);
                showToast('⚠️ 蓝牙已断开', 'warn');
            }

            function disconnect() {
                if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
                    bluetoothDevice.gatt.disconnect();
                } else {
                    onDisconnect();
                }
            }

            // 绑定事件
            scanBtn.addEventListener('click', scan);
            scanBtn2.addEventListener('click', scan);
            connectBtn.addEventListener('click', connect);
            connectBtn2.addEventListener('click', connect);
            disconnectBtn.addEventListener('click', disconnect);
            disconnectBtn2.addEventListener('click', disconnect);

            // ==================== 初始化 ====================
            function init() {
                updateConnectionUI(false);
                updateCloudStatus(false);
                updateDataCount();
                updateServoDisplay(90);
                // 默认显示配置面板以便用户首次配置
                showConfigPanel();
                addLog('🦾 抓仰头控制界面 · 江理工 已启动', 'system');
                addLog(`☁️ 巴法云 UID: ${BEMFA_UID.substring(0, 8)}... | 主题: ${BEMFA_TOPIC}`, 'system');
                addLog('📋 蓝牙接收格式: #力反馈数据#是否接触背部#', 'system');
                addLog('📤 舵机下发格式: #舵机角度# (0~180°)', 'system');
                addLog('💡 蓝牙接收的数据将原封不动上传至巴法云', 'system');
            }

            // ==================== 页面销毁前清理 ====================
            window.addEventListener('beforeunload', () => {
                if (servoSendTimer) clearTimeout(servoSendTimer);
                if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
                    bluetoothDevice.gatt.disconnect();
                }
            });

            // ==================== 页面可见性变化时更新时钟 ====================
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && isConnected) {
                    updateConnectionUI(true);
                }
            });

            init();
        })();
    </script>
</body>
</html>
